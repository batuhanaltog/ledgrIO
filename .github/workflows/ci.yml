name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + types + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledgrio_test
          POSTGRES_USER: ledgrio
          POSTGRES_PASSWORD: ledgrio_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledgrio -d ledgrio_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-secret-not-used-in-prod-${{ github.sha }}
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://ledgrio:ledgrio_ci_password@localhost:5432/ledgrio_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "15"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy .

      - name: Migrate (test DB)
        run: python manage.py migrate --noinput

      - name: Pytest with coverage
        run: pytest --cov=. --cov-report=term --cov-fail-under=90
