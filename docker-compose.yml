services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ledgrio}
      POSTGRES_USER: ${POSTGRES_USER:-ledgrio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgrio_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledgrio_user} -d ${POSTGRES_DB:-ledgrio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    command: >
      bash -c "python manage.py migrate --noinput &&
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/media
    expose:
      - "8000"

  celery_worker:
    build:
      context: ./backend
      target: production
    command: celery -A celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/media
    restart: on-failure

  celery_beat:
    build:
      context: ./backend
      target: production
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      target: production
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - frontend

  flower:
    image: mher/flower:2.0
    command: celery --broker=${CELERY_BROKER_URL:-redis://redis:6379/0} flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_files:
