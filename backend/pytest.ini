[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = tests/test_*.py test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests
